<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеочат по Wi-Fi</title>
    <style>
        body {
            font-family: system-ui;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            color: white;
            margin: 5px;
            cursor: pointer;
        }
        input {
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            font-size: 16px;
            margin: 10px 0;
            background: #334155;
            color: white;
            border: none;
        }
        .ip-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 20px;
            text-align: center;
            margin: 10px 0;
        }
        video {
            width: 100%;
            border-radius: 16px;
            margin-top: 10px;
            background: black;
        }
        .status {
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .green { background: #065f46; }
        .red { background: #991b1b; }
        .yellow { background: #854d0e; }
    </style>
</head>
<body>
<div class="card">
    <h2>📡 Видеочат по Wi-Fi</h2>
    
    <button id="getIpBtn">📍 Узнать мой IP для друга</button>
    <div id="ipBox" class="ip-box" style="display:none"></div>
    
    <hr>
    
    <h3>🔌 Подключиться к другу</h3>
    <input type="text" id="friendIp" placeholder="Введите IP друга (например 192.168.1.5)">
    <button id="callBtn">📞 Позвонить</button>
    
    <div id="status" class="status yellow">⚡ Готов</div>
</div>

<div id="callArea" style="display:none">
    <div class="card">
        <h3>👤 Собеседник</h3>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="card">
        <h3>🎥 Моя камера</h3>
        <video id="localVideo" autoplay playsinline muted></video>
        <button id="switchCam">🔄 Переключить камеру</button>
        <button id="endCall" style="background:#dc2626">❌ Завершить</button>
    </div>
</div>

<script>
    let localStream = null;
    let pc = null;
    let myIp = null;
    
    const statusDiv = document.getElementById('status');
    const ipBox = document.getElementById('ipBox');
    const callArea = document.getElementById('callArea');
    
    function setStatus(text, color = 'yellow') {
        statusDiv.textContent = text;
        statusDiv.className = `status ${color}`;
    }
    
    // === ПРОСТОЙ СПОСОБ ПОКАЗАТЬ IP (через prompt) ===
    document.getElementById('getIpBtn').onclick = () => {
        // Способ 1: Просим пользователя ввести IP вручную из настроек телефона
        const manualIp = prompt('Введите IP вашего телефона вручную (Настройки → Wi-Fi → IP-адрес):\nОбычно начинается на 192.168.');
        if (manualIp && manualIp.trim()) {
            myIp = manualIp.trim();
            ipBox.style.display = 'block';
            ipBox.innerHTML = `📡 Ваш IP: <strong>${myIp}</strong><br><small>Скажите этот IP другу</small>`;
            setStatus(`✅ IP сохранён: ${myIp}`, 'green');
            navigator.clipboard.writeText(myIp);
        } else {
            setStatus('⚠️ Введите IP из настроек Wi-Fi', 'red');
        }
    };
    
    // === ЗАПУСК КАМЕРЫ ===
    async function startCamera() {
        try {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
            }
            localStream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('localVideo').srcObject = localStream;
            return true;
        } catch(e) {
            setStatus('❌ Ошибка камеры: ' + e.message, 'red');
            return false;
        }
    }
    
    // === КОГДА НАЖИМАЮТ "ПОЗВОНИТЬ" (этот телефон — ДРУГ, который звонит) ===
    document.getElementById('callBtn').onclick = async () => {
        const friendIp = document.getElementById('friendIp').value.trim();
        if (!friendIp) {
            setStatus('❌ Введите IP друга', 'red');
            return;
        }
        
        setStatus(`📞 Звоню на ${friendIp}...`, 'yellow');
        
        const cameraOk = await startCamera();
        if (!cameraOk) return;
        
        // Создаём соединение
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        pc = new RTCPeerConnection(config);
        
        // Добавляем камеру
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        // Показываем видео собеседника
        pc.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            callArea.style.display = 'block';
            setStatus('✅ Соединение установлено!', 'green');
        };
        
        // Создаём предложение
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        // Показываем код для хоста
        const offerCode = JSON.stringify(offer);
        const answerCode = prompt(`📤 Отправьте этот код другу (хосту):\n\n${offerCode}\n\nПосле отправки вставьте ответ от друга:`);
        
        if (answerCode) {
            const answer = JSON.parse(answerCode);
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
    };
    
    // === ЕСЛИ ЭТОТ ТЕЛЕФОН — ХОСТ (принимает звонок) ===
    async function acceptCall(offerCode) {
        const cameraOk = await startCamera();
        if (!cameraOk) return;
        
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        pc = new RTCPeerConnection(config);
        
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        pc.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            callArea.style.display = 'block';
            setStatus('✅ Соединение установлено!', 'green');
        };
        
        const offer = JSON.parse(offerCode);
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        
        // Отдаём ответ
        prompt('📥 Скопируйте этот код и отправьте другу:', JSON.stringify(answer));
    }
    
    // Проверяем, не передан ли код в URL (для хоста)
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const offerParam = urlParams.get('offer');
        if (offerParam) {
            acceptCall(decodeURIComponent(offerParam));
        }
    };
    
    // Переключение камеры
    document.getElementById('switchCam')?.addEventListener('click', async () => {
        if (localStream) {
            const tracks = localStream.getTracks();
            tracks.forEach(t => t.stop());
        }
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'environment' } } });
        document.getElementById('localVideo').srcObject = localStream;
        if (pc) {
            const sender = pc.getSenders().find(s => s.track?.kind === 'video');
            if (sender) sender.replaceTrack(localStream.getVideoTracks()[0]);
        }
    });
    
    document.getElementById('endCall')?.addEventListener('click', () => {
        if (pc) pc.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        callArea.style.display = 'none';
        setStatus('📴 Звонок завершён', 'yellow');
    });
</script>
</body>
</html>
