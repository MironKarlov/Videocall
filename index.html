<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеочат — работает!</title>
    <style>
        body { font-family: system-ui; background: #000; color: white; padding: 20px; text-align: center; }
        button { background: #3b82f6; padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; color: white; margin: 10px; width: 90%; }
        input { width: 90%; padding: 12px; font-size: 16px; border-radius: 50px; border: none; margin: 10px 0; text-align: center; }
        video { width: 100%; border-radius: 20px; margin-top: 10px; background: #111; }
        .box { background: #222; padding: 15px; border-radius: 20px; margin: 15px 0; }
        .green { background: #1a5f1a; }
    </style>
</head>
<body>

<h2>📹 ВИДЕОЧАТ</h2>

<div class="box">
    <p>🎮 <strong>ВВЕДИТЕ ОДИНАКОВОЕ НАЗВАНИЕ КОМНАТЫ</strong></p>
    <input type="text" id="roomName" placeholder="Например: комната123">
    <button id="joinBtn">🔗 ВОЙТИ В КОМНАТУ</button>
</div>

<div id="callArea" style="display:none">
    <div class="box">
        <p>👤 <strong>СОБЕСЕДНИК</strong></p>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="box">
        <p>🤳 <strong>ВЫ</strong></p>
        <video id="localVideo" autoplay playsinline muted></video>
        <button id="endBtn" style="background:#dc2626">❌ ВЫЙТИ</button>
    </div>
</div>

<div id="status" style="background:#333; padding:10px; border-radius:20px; margin-top:20px"></div>

<script>
    let localStream = null;
    let pc = null;
    let ws = null;
    let roomName = null;

    function status(msg, color = '#ffaa00') {
        const div = document.getElementById('status');
        div.innerHTML = msg;
        div.style.background = color;
    }

    // Запуск камеры
    async function startCamera() {
        try {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('localVideo').srcObject = localStream;
            return true;
        } catch(e) {
            status('❌ Ошибка камеры: ' + e.message, '#8b0000');
            return false;
        }
    }

    // Подключение к комнате
    document.getElementById('joinBtn').onclick = async () => {
        roomName = document.getElementById('roomName').value.trim();
        if (!roomName) {
            status('❌ Введите название комнаты', '#8b0000');
            return;
        }

        status('🎥 Включаю камеру...', '#ffaa00');
        const ok = await startCamera();
        if (!ok) return;

        // Подключаемся к бесплатному сигналинг-серверу
        ws = new WebSocket('wss://webrtc-signaling-server-1.onrender.com');
        
        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'join', room: roomName }));
            status('📡 Подключено к серверу, ждём собеседника...', '#ffaa00');
        };

        ws.onmessage = async (message) => {
            const data = JSON.parse(message.data);
            
            if (data.type === 'joined') {
                status('✅ Собеседник найден! Устанавливаем соединение...', '#1a5f1a');
                createOffer();
            }
            else if (data.type === 'offer') {
                await handleOffer(data.offer);
            }
            else if (data.type === 'answer') {
                await handleAnswer(data.answer);
            }
            else if (data.type === 'ice') {
                if (pc) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            }
        };

        ws.onerror = () => {
            status('❌ Ошибка сервера. Проверьте интернет', '#8b0000');
        };
    };

    async function createOffer() {
        pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        });

        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('callArea').style.display = 'block';
            status('✅ ВИДЕО СОЕДИНЕНО!', '#1a5f1a');
        };

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                ws.send(JSON.stringify({ type: 'ice', candidate: e.candidate, room: roomName }));
            }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'offer', offer: offer, room: roomName }));
    }

    async function handleOffer(offer) {
        pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        });

        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('callArea').style.display = 'block';
            status('✅ ВИДЕО СОЕДИНЕНО!', '#1a5f1a');
        };

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                ws.send(JSON.stringify({ type: 'ice', candidate: e.candidate, room: roomName }));
            }
        };

        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'answer', answer: answer, room: roomName }));
    }

    async function handleAnswer(answer) {
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
    }

    document.getElementById('endBtn').onclick = () => {
        if (pc) pc.close();
        if (ws) ws.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('callArea').style.display = 'none';
        status('📴 Выход', '#333');
        location.reload();
    };
</script>
</body>
</html>
