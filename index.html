<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеочат — просто</title>
    <style>
        body { font-family: system-ui; background: #000; color: white; padding: 20px; text-align: center; }
        button { background: #3b82f6; padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; color: white; margin: 10px; width: 90%; }
        textarea { width: 95%; height: 100px; background: #222; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 10px; margin: 10px 0; }
        input { width: 90%; padding: 12px; font-size: 16px; border-radius: 50px; border: none; margin: 10px 0; text-align: center; }
        video { width: 100%; border-radius: 20px; margin-top: 10px; background: #111; }
        .box { background: #222; padding: 15px; border-radius: 20px; margin: 15px 0; }
        .green { background: #1a5f1a; }
        .red { background: #8b0000; }
    </style>
</head>
<body>

<h2>📹 ВИДЕОЧАТ</h2>

<div class="box">
    <p>🔵 <strong>ВАШ IP ИЗ НАСТРОЕК Wi-Fi</strong></p>
    <input type="text" id="myIp" placeholder="Например: 192.168.1.45">
    <button id="saveIpBtn">✅ СОХРАНИТЬ</button>
</div>

<div class="box" id="hostBox">
    <p style="color:#0f0">👑 <strong>ХОСТ (кого смотрят)</strong></p>
    <button id="createRoomBtn">🏠 СОЗДАТЬ КОМНАТУ</button>
    <div id="hostCodeArea" style="display:none">
        <p>📤 <strong>ОТПРАВЬТЕ ЭТОТ КОД ДРУГУ:</strong></p>
        <textarea id="hostCode" readonly></textarea>
        <button id="copyHostCodeBtn">📋 КОПИРОВАТЬ</button>
    </div>
</div>

<div class="box" id="guestBox">
    <p style="color:#ff0">👤 <strong>ДРУГ (кто смотрит)</strong></p>
    <textarea id="guestCodeInput" placeholder="Вставьте сюда код от хоста..."></textarea>
    <button id="connectBtn">🔗 ПОДКЛЮЧИТЬСЯ</button>
</div>

<div id="callArea" style="display:none">
    <div class="box">
        <p>👤 <strong>ВИДЕО СОБЕСЕДНИКА</strong></p>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="box">
        <p>🤳 <strong>МОЯ КАМЕРА</strong></p>
        <video id="localVideo" autoplay playsinline muted></video>
        <button id="endBtn" style="background:#dc2626">❌ ЗАВЕРШИТЬ</button>
    </div>
</div>

<div id="status" style="background:#333; padding:10px; border-radius:20px; margin-top:20px"></div>

<script>
    let localStream = null;
    let pc = null;
    let myIp = null;
    let currentOffer = null;

    function status(msg, color = '#ffaa00') {
        const div = document.getElementById('status');
        div.innerHTML = msg;
        div.style.background = color;
    }

    document.getElementById('saveIpBtn').onclick = () => {
        myIp = document.getElementById('myIp').value.trim();
        if (myIp) {
            status('✅ IP сохранён: ' + myIp, '#1a5f1a');
        } else {
            status('❌ Введите IP из настроек Wi-Fi', '#8b0000');
        }
    };

    async function startCamera() {
        try {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('localVideo').srcObject = localStream;
            return true;
        } catch(e) {
            status('❌ Ошибка камеры: ' + e.message, '#8b0000');
            return false;
        }
    }

    // === ХОСТ: СОЗДАТЬ КОМНАТУ ===
    document.getElementById('createRoomBtn').onclick = async () => {
        if (!myIp) {
            status('❌ Сначала сохраните ваш IP', '#8b0000');
            return;
        }

        status('🎥 Создаю комнату, включаю камеру...', '#ffaa00');
        const ok = await startCamera();
        if (!ok) return;

        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        pc.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('callArea').style.display = 'block';
            status('✅ ВИДЕО СОЕДИНЕНО!', '#1a5f1a');
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        const offerCode = JSON.stringify(offer);
        document.getElementById('hostCode').value = offerCode;
        document.getElementById('hostCodeArea').style.display = 'block';
        status('📤 Код создан! Отправьте его другу', '#1a5f1a');
    };

    document.getElementById('copyHostCodeBtn').onclick = () => {
        const code = document.getElementById('hostCode').value;
        navigator.clipboard.writeText(code);
        status('✅ Код скопирован! Отправьте другу', '#1a5f1a');
    };

    // === ДРУГ: ПОДКЛЮЧИТЬСЯ ===
    document.getElementById('connectBtn').onclick = async () => {
        const code = document.getElementById('guestCodeInput').value.trim();
        if (!code) {
            status('❌ Вставьте код от хоста', '#8b0000');
            return;
        }
        
        if (!myIp) {
            status('❌ Сначала сохраните ваш IP', '#8b0000');
            return;
        }

        status('🎥 Включаю камеру...', '#ffaa00');
        const ok = await startCamera();
        if (!ok) return;

        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        pc.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('callArea').style.display = 'block';
            status('✅ ВИДЕО СОЕДИНЕНО!', '#1a5f1a');
        };

        try {
            const offer = JSON.parse(code);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            const answerCode = JSON.stringify(answer);
            
            // Показываем ответ, который нужно отправить хосту
            prompt('📥 Скопируйте этот код и отправьте ХОСТУ (вставьте в чат):\n\n' + answerCode);
            
            status('✅ Код отправлен хосту, ожидаем видео...', '#1a5f1a');
        } catch(e) {
            status('❌ Неверный код. Попросите хоста скопировать код заново', '#8b0000');
        }
    };

    document.getElementById('endBtn').onclick = () => {
        if (pc) pc.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('callArea').style.display = 'none';
        document.getElementById('hostCodeArea').style.display = 'none';
        status('📴 Звонок завершён', '#333');
    };
</script>
</body>
</html>
