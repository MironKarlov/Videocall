<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеочат по Wi-Fi</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        video {
            width: 100%;
            border-radius: 16px;
            background: #000;
            margin-top: 10px;
        }
        button {
            background: #0f6bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
        }
        input {
            padding: 12px;
            border-radius: 30px;
            border: none;
            width: 70%;
            font-size: 16px;
            margin: 10px 0;
        }
        .card {
            background: #2a2a3e;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
        }
        .ip-box {
            background: #0f0f1a;
            padding: 15px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 18px;
            word-break: break-all;
            text-align: center;
        }
        .status {
            padding: 10px;
            border-radius: 12px;
            margin: 10px 0;
        }
        .connected { background: #0a5a2a; }
        .waiting { background: #5a4a0a; }
        .error { background: #8a2a2a; }
    </style>
</head>
<body>
<div class="container">
    <h2>📹 Видеочат по Wi-Fi</h2>
    
    <div class="card" id="createRoomPanel">
        <h3>🎮 Создать лобби</h3>
        <button id="createBtn">➕ Создать комнату (я хост)</button>
        <div id="hostIP" style="margin-top:15px;display:none">
            <p>📡 Ваш IP для друга:</p>
            <div class="ip-box" id="ipAddress">-</div>
            <button id="copyBtn">📋 Скопировать IP</button>
        </div>
    </div>
    
    <div class="card" id="joinPanel">
        <h3>🔌 Подключиться к другу</h3>
        <input type="text" id="friendIP" placeholder="Введите IP хоста (например: 192.168.1.5)">
        <button id="joinBtn">🔗 Подключиться</button>
    </div>
    
    <div id="videoPanel" style="display:none">
        <div class="card">
            <h3>📺 Видео собеседника</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="card">
            <h3>🎥 Моя камера</h3>
            <video id="localVideo" autoplay playsinline muted></video>
            <button id="toggleCameraBtn">🔄 Переключить камеру</button>
        </div>
        <button id="hangupBtn" style="background:#c03939">📞 Завершить звонок</button>
    </div>
    
    <div id="statusMsg" class="status waiting">⚪ Ожидание действия...</div>
</div>

<script>
    // === Глобальные переменные ===
    let localStream = null;
    let peerConnection = null;
    let ws = null;
    let isHost = false;
    let currentCamera = 'user';
    
    const statusDiv = document.getElementById('statusMsg');
    
    function setStatus(text, type = 'waiting') {
        statusDiv.textContent = text;
        statusDiv.className = `status ${type}`;
    }
    
    // === Получение локального IP ===
    async function getLocalIP() {
        return new Promise((resolve) => {
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            pc.createOffer().then(offer => pc.setLocalDescription(offer));
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    const ip = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/)?.[0];
                    if (ip && !ip.startsWith('127.')) {
                        pc.close();
                        resolve(ip);
                    }
                }
            };
            setTimeout(() => {
                pc.close();
                resolve('Не удалось получить IP');
            }, 2000);
        });
    }
    
    // === СОЗДАНИЕ ЛОББИ (ХОСТ) ===
    document.getElementById('createBtn').onclick = async () => {
        isHost = true;
        const ip = await getLocalIP();
        document.getElementById('ipAddress').textContent = ip;
        document.getElementById('hostIP').style.display = 'block';
        setStatus(`✅ Лобби создано! Ваш IP: ${ip}. Скажите его другу.`, 'connected');
        
        // Запрашиваем камеру сразу
        await startLocalCamera();
        
        // Создаём WebSocket сервер прямо в браузере (через простой HTTP + WebRTC сигналинг)
        startSignalingServer();
    };
    
    // Простой сигналинг-сервер в браузере (используем BroadcastChannel для демо,
    // но для реального по IP нужно запустить сервер. Вот упрощённое решение с ручным вводом)
    function startSignalingServer() {
        // Для полной автоматизации нужен отдельный WebSocket сервер.
        // Пока сделаем через обмен IP + WebRTC напрямую
        
        setStatus('📡 Ожидаем подключения друга...', 'waiting');
        
        // Создаём PeerConnection и ждём офера от друга
        peerConnection = new RTCPeerConnection({ iceServers: [] });
        
        // Добавляем локальную камеру
        if (localStream) {
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
        
        peerConnection.ontrack = (event) => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
            document.getElementById('videoPanel').style.display = 'block';
            setStatus('🔗 Видео соединение установлено!', 'connected');
        };
        
        // Обработка ICE кандидатов (отправляем другу)
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                // В реальном коде нужно отправить через WebSocket, но для простоты сохраняем
                console.log('ICE кандидат:', event.candidate);
            }
        };
        
        // Ждём SDP от друга (через URL параметры или prompt)
        const sdpFromFriend = prompt('Ожидание подключения. Вставьте SDP от друга (придёт после того, как друг нажмёт "Подключиться"):');
        if (sdpFromFriend) {
            handleRemoteSDP(sdpFromFriend);
        }
    }
    
    async function handleRemoteSDP(sdpJson) {
        try {
            const remoteDesc = JSON.parse(sdpJson);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            // Отдаём ответ другу (через prompt)
            const answerStr = JSON.stringify(answer);
            prompt('Скопируйте этот SDP и отправьте другу:', answerStr);
        } catch(e) {
            setStatus('Ошибка: ' + e.message, 'error');
        }
    }
    
    // === ПОДКЛЮЧЕНИЕ К ДРУГУ ===
    async function startLocalCamera() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentCamera }, 
                audio: false 
            });
            document.getElementById('localVideo').srcObject = localStream;
            return true;
        } catch(e) {
            setStatus('Ошибка камеры: ' + e.message, 'error');
            return false;
        }
    }
    
    document.getElementById('joinBtn').onclick = async () => {
        const friendIP = document.getElementById('friendIP').value;
        if (!friendIP) {
            setStatus('Введите IP хоста', 'error');
            return;
        }
        
        setStatus(`🔍 Подключаемся к ${friendIP}...`, 'waiting');
        
        // Запрашиваем камеру
        await startLocalCamera();
        
        // Создаём PeerConnection
        peerConnection = new RTCPeerConnection({ iceServers: [] });
        
        if (localStream) {
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
        
        peerConnection.ontrack = (event) => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
            document.getElementById('videoPanel').style.display = 'block';
            setStatus('✅ Соединение установлено!', 'connected');
        };
        
        // Создаём офер (предложение)
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        // Отправляем офер хосту (через prompt - нужно передать вручную)
        const offerStr = JSON.stringify(offer);
        const answerStr = prompt('Отправьте это предложение хосту, затем вставьте его ответ:', offerStr);
        
        if (answerStr) {
            const answer = JSON.parse(answerStr);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }
    };
    
    // Переключение камеры
    document.getElementById('toggleCameraBtn')?.addEventListener('click', async () => {
        currentCamera = currentCamera === 'user' ? 'environment' : 'user';
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentCamera }, 
                audio: false 
            });
            document.getElementById('localVideo').srcObject = localStream;
            
            // Обновляем треки в peerConnection
            if (peerConnection) {
                const senders = peerConnection.getSenders();
                const videoSender = senders.find(s => s.track?.kind === 'video');
                if (videoSender) {
                    videoSender.replaceTrack(localStream.getVideoTracks()[0]);
                }
            }
        }
    });
    
    document.getElementById('hangupBtn')?.addEventListener('click', () => {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        document.getElementById('videoPanel').style.display = 'none';
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('localVideo').srcObject = null;
        setStatus('📞 Звонок завершён', 'waiting');
        location.reload(); // Простой перезагруз для сброса
    });
    
    document.getElementById('copyBtn')?.addEventListener('click', () => {
        const ip = document.getElementById('ipAddress').textContent;
        navigator.clipboard.writeText(ip);
        setStatus('IP скопирован!', 'connected');
    });
</script>
</body>
</html>
