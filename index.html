<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Видеть друга — включение камеры</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #1a1e2c 0%, #2a2f3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(22, 26, 35, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 16px;
            color: #ffffff;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .sub {
            text-align: center;
            color: #a0a8c0;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        .video-wrapper {
            background: #000000;
            border-radius: 32px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 24px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(1);
            transition: transform 0.2s;
        }
        /* Зеркальный режим удобен для фронталки, но можно убрать */
        video.mirror {
            transform: scaleX(-1);
        }
        .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f111a;
            color: #b9c3db;
            font-size: 1.2rem;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .placeholder svg {
            opacity: 0.6;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            background: #2e3a5c;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
            font-family: inherit;
            border: 1px solid rgba(255,255,255,0.15);
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #0f6bff;
            box-shadow: 0 8px 20px rgba(15, 107, 255, 0.3);
        }
        .btn-primary:hover {
            background: #3b82f6;
        }
        .btn-danger {
            background: #9b2e2e;
        }
        .btn-danger:hover {
            background: #c03939;
        }
        .info {
            background: #1e2436;
            border-radius: 28px;
            padding: 14px 20px;
            font-size: 0.85rem;
            color: #cbd5ff;
            text-align: center;
            border-left: 4px solid #0f6bff;
        }
        .status {
            font-weight: 600;
            margin-top: 8px;
        }
        .friend-tag {
            background: #00000055;
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 5px 14px;
            position: absolute;
            bottom: 16px;
            left: 16px;
            color: white;
            font-weight: 500;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 2;
        }
        @media (max-width: 550px) {
            .container {
                padding: 16px;
            }
            button {
                padding: 10px 22px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 Видеть друга</h1>
    <div class="sub">Нажми «Включить камеру» — и ты увидишь своего друга (или себя 😄)</div>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div id="placeholder" class="placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span>Камера выключена</span>
        </div>
        <div class="friend-tag" id="friendTag">👤 Ждём включения</div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn-primary">🎥 Включить камеру</button>
        <button id="stopBtn" class="btn-danger" disabled>⏹️ Выключить</button>
    </div>

    <div class="info">
        💡 <strong>Как «видеть друга»?</strong><br>
        После включения камеры вы увидите своё видео. Для настоящего звонка другу нужен WebRTC, но этот пример демонстрирует захват камеры.  
        <span class="status" id="statusMsg">⚫ Камера не активна</span>
    </div>
</div>

<script>
    (function() {
        const videoElement = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const placeholderDiv = document.getElementById('placeholder');
        const friendTagSpan = document.getElementById('friendTag');
        const statusSpan = document.getElementById('statusMsg');
        
        let mediaStream = null;   // текущий поток камеры
        let isCameraActive = false;

        // Функция остановки камеры (освобождаем треки)
        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => {
                    track.stop();
                });
                mediaStream = null;
            }
            videoElement.srcObject = null;
            isCameraActive = false;
            
            // Показываем плейсхолдер
            placeholderDiv.style.opacity = '1';
            placeholderDiv.style.pointerEvents = 'none';
            videoElement.classList.remove('mirror'); // убираем зеркало (не принципиально)
            
            // Обновляем UI
            startBtn.disabled = false;
            stopBtn.disabled = true;
            friendTagSpan.innerHTML = '👤 Камера выключена';
            statusSpan.innerHTML = '🔴 Камера не активна';
            statusSpan.style.color = '#ff9e8f';
        }

        // Функция запуска камеры (по умолчанию — фронтальная, если доступна, но для "видеть друга" удобно использовать любую)
        async function startCamera(useFront = true) {
            // Если камера уже активна - сначала остановим
            if (mediaStream) {
                stopCamera();
            }
            
            // Определим какие устройства видеозахвата есть, чтобы предпочесть фронталку (environment/user)
            let constraints = {
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: useFront ? 'user' : 'environment'
                },
                audio: false   // для простоты без звука
            };
            
            try {
                statusSpan.innerHTML = '⏳ Запрашиваем разрешение камеры...';
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                mediaStream = stream;
                videoElement.srcObject = stream;
                
                // Дожидаемся метаданных видео, чтобы убрать placeholder плавно
                videoElement.onloadedmetadata = () => {
                    videoElement.play().catch(e => console.warn("autoplay error", e));
                    placeholderDiv.style.opacity = '0';
                    setTimeout(() => {
                        placeholderDiv.style.display = 'none';
                    }, 300);
                };
                
                // Если видео уже готово до onloadedmetadata (иногда)
                if (videoElement.readyState >= 2) {
                    placeholderDiv.style.opacity = '0';
                    placeholderDiv.style.display = 'none';
                }
                
                // Зеркальное отображение для фронталки выглядит естественнее для "видеть себя/друга"
                if (useFront) {
                    videoElement.classList.add('mirror');
                } else {
                    videoElement.classList.remove('mirror');
                }
                
                isCameraActive = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                friendTagSpan.innerHTML = '👥 Друг виден (трансляция активна) ✨';
                statusSpan.innerHTML = '🟢 Камера работает — вы видите изображение!';
                statusSpan.style.color = '#a2ff9e';
                
                // Сброс стиля отображения placeholder (на случай повторного включения)
                placeholderDiv.style.display = 'flex';
                placeholderDiv.style.opacity = '0';
                
            } catch (err) {
                console.error('Ошибка доступа к камере:', err);
                let errorMsg = '❌ Не удалось включить камеру: ';
                if (err.name === 'NotAllowedError') {
                    errorMsg += 'разрешение не предоставлено. Разрешите доступ к камере.';
                } else if (err.name === 'NotFoundError') {
                    errorMsg += 'камера не найдена на устройстве.';
                } else if (err.name === 'NotReadableError') {
                    errorMsg += 'камера уже используется другим приложением.';
                } else {
                    errorMsg += err.message || 'неизвестная ошибка.';
                }
                statusSpan.innerHTML = errorMsg;
                statusSpan.style.color = '#ffaa88';
                friendTagSpan.innerHTML = '⚠️ Ошибка камеры';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                // В случае ошибки плейсхолдер остается видимым
                placeholderDiv.style.opacity = '1';
                placeholderDiv.style.display = 'flex';
            }
        }
        
        // Функция, которая пытается включить лучшую камеру для "видеть друга" (фронтальная)
        // Если нет фронтальной, то включит любую доступную.
        async function enableCameraForFriend() {
            // Проверяем поддержку enumerateDevices, чтобы уточнить фронталку
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                    // fallback — просто user
                    await startCamera(true);
                    return;
                }
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoInputs = devices.filter(device => device.kind === 'videoinput');
                const hasFrontCamera = videoInputs.some(device => 
                    device.label.toLowerCase().includes('front') || 
                    device.label.toLowerCase().includes('user')
                );
                
                if (hasFrontCamera) {
                    await startCamera(true);
                } else {
                    // Если нет фронтальной, пробуем с facingMode: 'user' всё равно, либо берем первую
                    await startCamera(true);   // все равно попробуем user режим
                }
            } catch (err) {
                console.warn("Ошибка при перечислении устройств, запускаем камеру по умолчанию", err);
                await startCamera(true);
            }
        }
        
        // Обработка кнопок
        startBtn.addEventListener('click', () => {
            enableCameraForFriend().catch(e => {
                console.error(e);
                statusSpan.innerHTML = `❌ Ошибка: ${e.message || 'не удалось включить камеру'}`;
                friendTagSpan.innerHTML = '📵 Нет доступа к камере';
            });
        });
        
        stopBtn.addEventListener('click', () => {
            stopCamera();
            // Показываем плейсхолдер и сбрасываем текст
            placeholderDiv.style.display = 'flex';
            placeholderDiv.style.opacity = '1';
            videoElement.classList.remove('mirror');
        });
        
        // При загрузке страницы пока всё выключено, корректно отображаем плейсхолдер
        stopCamera(); // гарантированно чистое состояние
        
        // Доп. утилита: если пользователь закрыл вкладку или страницу — останавливаем камеру
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
        });
        
        // Небольшой хинт: при клике на "Включить камеру" демонстрируем видеопоток
        // что позволяет "видеть друга" — вы можете представить, что по WebRTC это изображение
        // отправляется другу. Но для демонстрации возможностей хватит.
    })();
</script>
</body>
</html>
